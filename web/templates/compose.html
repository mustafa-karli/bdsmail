{{define "title"}}Compose{{end}}
{{define "content"}}
<div class="card">
    <h2>Compose Message</h2>
    <p class="message-meta" style="margin-bottom:16px;">Sending as <strong>{{if .DisplayName}}{{.DisplayName}} &lt;{{.Email}}&gt;{{else}}{{.Email}}{{end}}</strong></p>
    {{if .Error}}
    <div class="alert alert-error">{{.Error}}</div>
    {{end}}
    {{if .Success}}
    <div class="alert alert-success">{{.Success}}</div>
    {{end}}
    <form method="POST" action="/compose">
        <div class="form-group">
            <label for="to">To</label>
            <input type="text" id="to" name="to" placeholder="recipient@example.com" required value="{{.FormTo}}">
        </div>
        <div class="form-group">
            <label for="cc">CC</label>
            <input type="text" id="cc" name="cc" placeholder="cc@example.com (comma-separated)" value="{{.FormCC}}">
        </div>
        <div class="form-group">
            <label for="bcc">BCC</label>
            <input type="text" id="bcc" name="bcc" placeholder="bcc@example.com (comma-separated)" value="{{.FormBCC}}">
        </div>
        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" value="{{.FormSubject}}">
        </div>
        <div class="form-group">
            <label for="content_type">Format</label>
            <select id="content_type" name="content_type">
                <option value="text/plain" {{if eq .FormContentType "text/plain"}}selected{{end}}>Plain Text</option>
                <option value="text/html" {{if eq .FormContentType "text/html"}}selected{{end}}>HTML</option>
            </select>
        </div>
        <div class="form-group">
            <label for="body">Body</label>
            <textarea id="body" name="body">{{.FormBody}}</textarea>
        </div>
        <button type="submit" class="btn">Send</button>
        <a href="/inbox" class="btn btn-secondary" style="margin-left:8px;">Cancel</a>
    </form>
</div>
{{end}}
