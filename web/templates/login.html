{{define "title-login"}}Login{{end}}
{{define "content-login"}}
<div class="login-container">
    <div class="card">
        <img src="/static/bdsmail_logo1.png" alt="BDS Mail" style="width:80px;margin-bottom:12px;">
        <h2>BDS Mail</h2>
        <p>Sign in to {{.Domain}}</p>
        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn" style="width:100%;">Sign In</button>
        </form>
        <p style="margin-top:12px;font-size:0.85em;color:#888;text-align:center;">
            New here? <a href="/signup">Register your domain</a>
        </p>
    </div>
</div>
{{end}}
